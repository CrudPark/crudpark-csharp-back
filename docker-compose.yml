version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: crudpark-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: crudpark_db
      POSTGRES_USER: crudpark_user
      POSTGRES_PASSWORD: CrudPark2025!
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../crudpark-database-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - crudpark-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crudpark_user -d crudpark_db"]
      interval: 30s
      timeout: 10s
      retries: 3

  # CrudPark API
  crudpark-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crudpark-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=159.69.183.43;Port=5433;Database=crudpark_db;Username=crudpark_user;Password=CrudPark2025!;
      - EmailSettings__SmtpServer=smtp.gmail.com
      - EmailSettings__SmtpPort=587
      - EmailSettings__SmtpUsername=${EMAIL_USERNAME:-your-email@gmail.com}
      - EmailSettings__SmtpPassword=${EMAIL_PASSWORD:-your-app-password}
      - EmailSettings__FromEmail=${EMAIL_USERNAME:-your-email@gmail.com}
      - EmailSettings__FromName=Sistema Parqueadero
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - crudpark-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: crudpark-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - crudpark-api
    networks:
      - crudpark-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  crudpark-network:
    driver: bridge
